<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Board Exams - EduShi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background: rgba(0,0,0,0.4);
}

.logo{
    font-size:22px;
    font-weight:bold;
}

/* HEADING */
.header{
    text-align:center;
    padding:40px 20px;
}

.header h1{
    font-size:28px;
    margin-bottom:10px;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap:20px;
    padding:30px;
}

.card{
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    text-align:center;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform: translateY(-10px);
    background: rgba(255,255,255,0.2);
}

/* BACK BUTTON */
.back{
    text-align:center;
    margin-bottom:30px;
}

.back a{
    text-decoration:none;
    color:white;
    background:#ff9800;
    padding:10px 20px;
    border-radius:8px;
}
</style>
</head>

<body>

<nav>
    <div class="logo">EduShi</div>
</nav>

<section class="header">
    <h1>Board Exams Preparation</h1>
    <p>Select Your Class</p>
</section>

<section class="container">
    <!-- All Classes -->
    <!-- Class 9 -->
    <!-- <div class="card">Class 9</div> -->
    <a href="class9/class9.html" style="text-decoration:none; color:white;">
        <div class="card">Class 9</div>
    </a>
    <!-- Class 10 -->
    <div class="card">Class 10</div>
    <!-- class 11 -->
    <div class="card">Class 11</div>
    <!-- CLASS 12 -->
    <div class="card">Class 12</div>
</section>

<div class="back">
    <a href="index.html">⬅ Back to Home</a>
</div>

</body>
</html>
