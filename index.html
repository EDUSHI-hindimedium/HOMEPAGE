<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduShi</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    position:sticky;
    top:0;
}

.logo{
    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

.menu{
    font-size:28px;
    cursor:pointer;
}

/* HERO SECTION */
.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:32px;
    margin-bottom:10px;
}

.hero p{
    opacity:0.8;
}

/* GRID SECTION */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    padding:30px;
}

.card{
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:15px;
    text-align:center;
    transition:0.3s ease;
    cursor:pointer;
    backdrop-filter: blur(8px);
}

.card:hover{
    transform: translateY(-10px);
    background: rgba(255,255,255,0.2);
}

.card h2{
    margin-bottom:10px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    margin-top:30px;
    background: rgba(0,0,0,0.4);
    font-size:14px;
}
.menu{
    font-size:28px;
    cursor:pointer;
    position:relative;
}

.dropdown{
    display:none;
    position:absolute;
    right:0;
    top:40px;
    background:white;
    color:black;
    width:150px;
    border-radius:8px;
    overflow:hidden;
}

.dropdown a{
    display:block;
    padding:10px;
    text-decoration:none;
    color:black;
    font-size:14px;
}

.dropdown a:hover{
    background:#eee;
}

</style>
</head>

<body>

<nav>
    <div class="logo">EduShi</div>
    <div class="menu" onclick="toggleMenu()">⋮
        <div class="dropdown" id="dropdownMenu">
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <!-- <a href="#" onclick="toggleDarkMode()">Dark Mode</a> -->
            <a href="#">Login</a>
        </div>
    </div>
</nav>

<section class="hero">
    <h1>Welcome to EduShi</h1>
    <p>Your Complete Study Platform</p>
</section>

<section class="container">
    <!-- <div class="card"> -->
        <a href="board.html" style="text-decoration:none; color:white;">
            <div class="card">
                <h2>Board Exams</h2>
                <p>Class 9th - 12th Complete Preparation</p>
            </div>
        </a>
    <!-- </div> -->

    <div class="card">
        <h2>SSC Foundation</h2>
        <p>Strong Base for SSC & Government Exams</p>
    </div>

    <div class="card">
        <h2>JEE / NEET</h2>
        <p>Engineering & Medical Entrance Preparation</p>
    </div>
</section>

<footer>
    © 2026 EduShi | Designed by Priyanshu
</footer>

<script>
    function toggleMenu(){
        var menu = document.getElementById("dropdownMenu");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    }
    
    // function toggleDarkMode(){
    //     document.body.classList.toggle("dark");
    // }
    </script>
</body>
</html>
